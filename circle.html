<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Pomodoro - Audio Wave</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        font-size: 1vmin;
    }

    div {
        display: flex;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;
        background-color: #f5f0e8;
        background-image:
            radial-gradient(ellipse at 20% 50%, rgba(255,252,245,0.8) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 50%, rgba(245,238,225,0.6) 0%, transparent 50%),
            linear-gradient(180deg, #f8f3eb 0%, #f0ead8 50%, #ebe5d5 100%);
    }

    .line {
        position: absolute;
        top: 50%;
        left: 50%;
        justify-content: center;
        align-items: start;
        width: 50rem;
        height: 50rem;
        transform-origin: center center;
        opacity: 0;
        z-index: 5;
        transition: opacity 0.8s ease-out, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .line.visible {
        opacity: 1;
    }

    .line::after {
        content: "";
        position: relative;
        width: 0.2rem;
        height: 8rem;
        background-color: #000;
        transform: scale(var(--s));
        transition: transform 0.15s ease;
    }

    @keyframes breathe {
        0%, 100% {
            opacity: 0.85;
        }
        50% {
            opacity: 1;
        }
    }

    .line.visible {
        animation: breathe 4s ease-in-out infinite;
    }

    /* ========== Animated Blob Background (from lab-display-screen) ========== */
    .noise {
        position: fixed;
        inset: 0;
        opacity: 0.25;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 20;
        mix-blend-mode: multiply;
    }

    .blobs {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }

    .shape {
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
    }

    .shape-1 {
        animation: morph1 14s infinite;
    }
    .shape-2 {
        animation: morph2 12s infinite;
    }
    .shape-3 {
        animation: morph3 16s infinite;
    }
    .shape-4 {
        animation: pulse 10s infinite;
    }

    @keyframes morph1 {
        0%, 100% {
            transform: translate(0, 0) scale(1) rotate(0deg);
        }
        25% {
            transform: translate(20px, -15px) scale(1.04) rotate(2deg);
        }
        50% {
            transform: translate(-10px, 20px) scale(0.97) rotate(-1deg);
        }
        75% {
            transform: translate(15px, 10px) scale(1.02) rotate(1deg);
        }
    }

    @keyframes morph2 {
        0%, 100% {
            transform: translate(0, 0) scale(1) rotate(0deg);
        }
        33% {
            transform: translate(-25px, 15px) scale(1.05) rotate(-2deg);
        }
        66% {
            transform: translate(15px, -20px) scale(0.96) rotate(2deg);
        }
    }

    @keyframes morph3 {
        0%, 100% {
            transform: translate(0, 0) scale(1) rotate(0deg);
        }
        50% {
            transform: translate(20px, 15px) scale(1.06) rotate(-2deg);
        }
    }

    @keyframes pulse {
        0%, 100% {
            opacity: 0.3;
            transform: scale(1);
        }
        50% {
            opacity: 0.45;
            transform: scale(1.06);
        }
    }

    #status {
        position: fixed;
        bottom: 3rem;
        color: #6a5e4e;
        font-size: 1.5rem;
        font-family: monospace;
        text-align: center;
        z-index: 10;
    }

    /* Pomodoro Timer Styles */
    .timer-container {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s ease-in;
    }

    .timer-container.visible {
        opacity: 1;
    }

    .timer-display {
        font-family: 'Arial Black', 'Impact', 'Haettenschweiler', sans-serif;
        font-weight: 900;
        font-size: 8rem;
        color: #3a3028;
        letter-spacing: 0.3rem;
        text-shadow:
            3px 3px 0 #d5c9b8,
            6px 6px 0 rgba(100,80,60,0.15),
            0 0 20px rgba(100,80,60,0.1);
        line-height: 1;
        margin-bottom: 2rem;
    }

    .timer-label {
        font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: 2.4rem;
        color: #6a5e4e;
        letter-spacing: 0.8rem;
        text-transform: uppercase;
    }

    .timer-controls {
        position: fixed;
        bottom: 8rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 3rem;
        z-index: 15;
        pointer-events: auto;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .timer-controls.visible {
        opacity: 1;
    }

    .timer-btn {
        font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 500;
        font-size: 1.8rem;
        padding: 1.2rem 2.5rem;
        color: #3a3028;
        background: rgba(250,246,239,0.95);
        border: 0.2rem solid #d5c9b8;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        letter-spacing: 0.3rem;
    }

    .timer-btn:hover {
        background: #f0ead8;
        border-color: #8a7e6e;
        transform: translateY(-0.3rem);
        box-shadow: 0 0.5rem 1rem rgba(100,80,60,0.15);
    }

    .timer-btn:active {
        transform: translateY(0.1rem);
        box-shadow: none;
    }

    /* Paper grain texture overlay — now handled by .noise-overlay div */

    /* ========== Welcome Overlay ========== */
    .welcome-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        cursor: pointer;
        font-family: 'Cormorant Garamond', Georgia, serif;
        transition: opacity 0.9s cubic-bezier(0.4, 0, 1, 1),
                    transform 0.9s cubic-bezier(0.4, 0, 1, 1);
    }

    .welcome-overlay.exiting {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
    }

    .welcome-overlay.hidden {
        display: none;
    }

    /* ── Left half: text ── */
    .welcome-left {
        position: relative;
        width: 50vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 3.5rem 0 4.5rem;
        padding-bottom: 12vh;
        z-index: 10;
    }

    .welcome-eyebrow {
        font-size: 12px;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(100, 85, 65, 0.55);
        font-style: normal;
        font-weight: 400;
        margin-bottom: 1.2rem;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.9s 0.6s ease, transform 0.9s 0.6s ease;
    }

    .welcome-eyebrow.visible {
        opacity: 1;
        transform: translateY(0);
    }

    .welcome-title {
        font-size: clamp(56px, 7.5vw, 108px);
        font-weight: 300;
        font-style: italic;
        color: rgba(50, 42, 34, 0.94);
        line-height: 1.0;
        letter-spacing: -0.01em;
        margin-bottom: 1.6rem;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 1s 0.8s ease, transform 1s 0.8s ease;
    }

    .welcome-title.visible {
        opacity: 1;
        transform: translateY(0);
    }

    .welcome-subtitle {
        font-size: 13px;
        font-weight: 300;
        font-style: normal;
        color: rgba(100, 85, 65, 0.4);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 2.4rem;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.9s 1s ease, transform 0.9s 1s ease;
    }

        .welcome-subtitle.visible {
        opacity: 1;
        transform: translateY(0);
    }

    .welcome-cta {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(80, 68, 52, 0.65);
        font-style: normal;
        font-weight: 400;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.9s 1.2s ease, transform 0.9s 1.2s ease;
    }

    .welcome-cta.visible {
        opacity: 1;
        transform: translateY(0);
    }

    .welcome-cta-line {
        display: block;
        width: 36px;
        height: 0.5px;
        background: rgba(100, 85, 65, 0.3);
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .welcome-overlay:hover .welcome-cta-line {
        width: 60px;
    }

    /* Badge in top-left */
    .welcome-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(90, 78, 62, 0.55);
        border: 0.5px solid rgba(100, 85, 65, 0.15);
        padding: 6px 14px;
        border-radius: 2px;
        font-style: normal;
        position: absolute;
        top: 2rem;
        left: 4.5rem;
        opacity: 0;
        transform: translateY(-6px);
        transition: opacity 0.9s 0.4s ease, transform 0.9s 0.4s ease;
    }

    .welcome-badge.visible {
        opacity: 1;
        transform: translateY(0);
    }

    .welcome-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(140, 110, 70, 0.65);
        animation: wp-dot-pulse 2.4s ease-in-out infinite;
        flex-shrink: 0;
    }

    @keyframes wp-dot-pulse {
        0%, 100% { opacity: 1;   transform: scale(1); }
        50%       { opacity: 0.2; transform: scale(0.65); }
    }

    /* ── Right half: image ── */
    .welcome-right {
        position: relative;
        width: 50vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .welcome-img {
        max-width: 48vw;
        max-height: 88vh;
        width: auto;
        height: auto;
        object-fit: contain;
        opacity: 0;
        filter: saturate(0.82) brightness(0.88) contrast(1.02);
        transform: scale(1.04);
        /* Elliptical feathered edges blend into background */
        -webkit-mask-image: radial-gradient(
            ellipse 54% 56% at 50% 48%,
            black 0%, black 50%,
            rgba(0,0,0,0.55) 68%,
            rgba(0,0,0,0.12) 84%,
            transparent 100%
        );
        mask-image: radial-gradient(
            ellipse 54% 56% at 50% 48%,
            black 0%, black 50%,
            rgba(0,0,0,0.55) 68%,
            rgba(0,0,0,0.12) 84%,
            transparent 100%
        );
        transition:
            opacity 2.2s cubic-bezier(0.4, 0, 0.2, 1),
            transform 14s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .welcome-img.loaded {
        opacity: 0.82;
        transform: scale(1);
    }

    .welcome-overlay:hover .welcome-img.loaded {
        transform: scale(1.015);
    }

    /* Warm glow behind image */
    .welcome-glow {
        position: absolute;
        width: 40vw;
        height: 60vh;
        border-radius: 50%;
        background: radial-gradient(
            ellipse at center,
            rgba(200, 180, 150, 0.15) 0%,
            rgba(170, 150, 120, 0.06) 50%,
            transparent 80%
        );
        filter: blur(50px);
        pointer-events: none;
        opacity: 0;
        transition: opacity 2.5s 0.5s ease;
    }

    .welcome-glow.visible {
        opacity: 1;
    }

    /* Divider line between left and right */
    .welcome-divider {
        position: absolute;
        top: 15%;
        bottom: 15%;
        left: 50%;
        width: 0.5px;
        background: linear-gradient(
            to bottom,
            transparent 0%,
            rgba(100, 85, 65, 0.12) 20%,
            rgba(100, 85, 65, 0.18) 50%,
            rgba(100, 85, 65, 0.12) 80%,
            transparent 100%
        );
        z-index: 5;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1.2s 1s ease;
    }

    .welcome-divider.visible {
        opacity: 1;
    }

    /* Corner label */
    .welcome-corner {
        position: absolute;
        top: 2rem;
        right: 2.5rem;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(90, 78, 62, 0.35);
        font-style: normal;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.9s 0.6s ease;
    }

    .welcome-corner.visible {
        opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
        .welcome-img, .welcome-eyebrow, .welcome-title,
        .welcome-subtitle, .welcome-cta, .welcome-badge,
        .welcome-glow, .welcome-divider, .welcome-corner {
            transition: none;
        }
        .welcome-img { opacity: 0.82; transform: scale(1); }
        .welcome-eyebrow, .welcome-title, .welcome-subtitle,
        .welcome-cta, .welcome-badge, .welcome-glow,
        .welcome-divider, .welcome-corner {
            opacity: 1; transform: none;
        }
    }
</style>

<body>
    <!-- Noise texture -->
    <div class="noise"></div>

    <!-- Welcome overlay -->
    <div class="welcome-overlay" id="welcome-overlay">
        <div class="welcome-divider" id="welcome-divider"></div>

        <!-- Left: text -->
        <div class="welcome-left">
            <div class="welcome-badge" id="welcome-badge">
                <div class="welcome-dot"></div>
                Music Pomodoro
            </div>
            <div class="welcome-eyebrow" id="welcome-eyebrow">find your rhythm</div>
            <h1 class="welcome-title" id="welcome-title">A space to<br>focus &amp; breathe</h1>
            <div class="welcome-subtitle" id="welcome-subtitle">click anywhere to begin</div>
            <div class="welcome-cta" id="welcome-cta">
                <span class="welcome-cta-line"></span>
                Enter
            </div>
        </div>

        <!-- Right: image -->
        <div class="welcome-right">
            <div class="welcome-glow" id="welcome-glow"></div>
            <img class="welcome-img" id="welcome-img" src="picture1.jpg" alt="" draggable="false" />
        </div>

        <div class="welcome-corner" id="welcome-corner">Welcome</div>
    </div>

    <!-- Abstract blob shapes -->
    <svg class="blobs" viewBox="0 0 1000 1333" preserveAspectRatio="xMidYMid slice">
        <defs>
            <filter id="softBlur">
                <feGaussianBlur in="SourceGraphic" stdDeviation="35" />
            </filter>
            <filter id="radialBlur">
                <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
            </filter>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0725b0;stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#0a32d4;stop-opacity:0.2" />
            </linearGradient>
            <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#0725b0;stop-opacity:0.45" />
                <stop offset="100%" style="stop-color:#051a80;stop-opacity:0.15" />
            </linearGradient>
            <linearGradient id="grad3" x1="50%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%" style="stop-color:#0a32d4;stop-opacity:0.5" />
                <stop offset="100%" style="stop-color:#0725b0;stop-opacity:0.1" />
            </linearGradient>
            <radialGradient id="radGrad1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#0725b0;stop-opacity:0.5" />
                <stop offset="70%" style="stop-color:#0725b0;stop-opacity:0.15" />
                <stop offset="100%" style="stop-color:#0725b0;stop-opacity:0" />
            </radialGradient>
        </defs>

        <!-- Large organic blob - center left -->
        <ellipse
            cx="380" cy="550"
            rx="320" ry="280"
            fill="url(#grad1)"
            filter="url(#softBlur)"
            class="shape shape-1"
        />

        <!-- Medium blob - upper right -->
        <ellipse
            cx="700" cy="400"
            rx="240" ry="220"
            fill="url(#grad2)"
            filter="url(#radialBlur)"
            class="shape shape-2"
        />

        <!-- Smaller blob - lower right -->
        <ellipse
            cx="650" cy="850"
            rx="200" ry="180"
            fill="url(#radGrad1)"
            filter="url(#softBlur)"
            class="shape shape-3"
        />

        <!-- Soft radial glow - center -->
        <circle
            cx="500" cy="600"
            r="350"
            fill="url(#radGrad1)"
            filter="url(#softBlur)"
            opacity="0.3"
            class="shape shape-4"
        />
    </svg>

    <!-- Pomodoro Timer Display -->
    <div class="timer-container" id="timer-container">
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-label">Focus Time</div>
    </div>

    <!-- Timer Controls -->
    <div class="timer-controls" id="timer-controls">
        <button class="timer-btn" id="timer-start">Start</button>
        <button class="timer-btn" id="timer-pause">Pause</button>
        <button class="timer-btn" id="timer-reset">Reset</button>
    </div>

    <div id="status"></div>
</body>
<script>
    const audio_wave = {
        lines_total: 200,
        lines: [],
        analyser: null,
        data_array: null,
        audio_ctx: null,
        anim_id: null,
        stream: null,

        async init() {
            for (let i = 0; i < this.lines_total; i++) {
                const angle = 360 / this.lines_total * i;
                const line = document.createElement("div");
                line.className = "line";
                line.style.setProperty("--s", 0);
                line.dataset.angle = angle;
                line.dataset.index = i;
                // Set initial transform with rotate for proper interpolation
                line.style.transform = `translate(-50%, -50%) rotate(${angle}deg) scale(0)`;
                document.body.appendChild(line);
                this.lines.push(line);
            }

            // Click anywhere to start
            document.body.onclick = () => this.start_capture();
        },

        async start_capture() {
            const status = document.getElementById("status");

            // If we already have a stream, just restart visualization
            if (this.stream && this.stream.active) {
                this.animate_lines_in();
                status.textContent = "listening...";
                return;
            }

            try {
                // Request audio (shows browser prompt)
                status.textContent = "please select a window/tab and enable audio sharing...";

                this.stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: true
                });

                const audio_track = this.stream.getAudioTracks()[0];
                if (!audio_track) {
                    status.textContent = "no audio track detected, please enable audio sharing";
                    return;
                }

                // Animate lines expanding from center
                this.animate_lines_in();

                // Setup audio context
                this.audio_ctx = new AudioContext();
                const source = this.audio_ctx.createMediaStreamSource(
                    new MediaStream([audio_track])
                );

                this.analyser = this.audio_ctx.createAnalyser();
                this.analyser.fftSize = 512;
                this.analyser.smoothingTimeConstant = 0.8;
                source.connect(this.analyser);

                this.data_array = new Uint8Array(this.analyser.frequencyBinCount);
                status.textContent = "listening...";
                this.run();

                audio_track.onended = () => {
                    cancelAnimationFrame(this.anim_id);
                    status.textContent = "audio stopped";
                    this.stream = null;
                    // Hide timer and controls
                    document.getElementById('timer-container').classList.remove('visible');
                    document.getElementById('timer-controls').classList.remove('visible');
                    // Reset lines
                    this.lines.forEach(line => {
                        line.classList.remove("visible");
                        line.style.transform = `translate(-50%, -50%) rotate(${line.dataset.angle}deg) scale(0)`;
                    });
                };
            } catch (e) {
                status.textContent = "failed: " + e.message;
            }
        },

        animate_lines_in() {
            this.lines.forEach((line, i) => {
                const angle = parseFloat(line.dataset.angle);
                // Staggered animation
                setTimeout(() => {
                    line.classList.add("visible");
                    line.style.transform = `translate(-50%, -50%) rotate(${angle}deg) scale(1)`;
                }, i * 15);
            });

            // Show timer and controls after animation
            setTimeout(() => {
                document.getElementById('timer-container').classList.add('visible');
                document.getElementById('timer-controls').classList.add('visible');
            }, this.lines_total * 15 + 500);
        },

        run() {
            const loop = () => {
                this.analyser.getByteTimeDomainData(this.data_array);
                const bin_count = this.data_array.length;

                for (let i = 0; i < this.lines_total; i++) {
                    const bin_index = Math.floor(i / this.lines_total * bin_count);
                    const value = Math.abs(this.data_array[bin_index] - 128) / 128 * 3;
                    this.lines[i].style.setProperty("--s", value);
                }

                this.anim_id = requestAnimationFrame(loop);
            };
            loop();
        }
    };
    // Welcome overlay logic
    const welcomeOverlay = document.getElementById('welcome-overlay');
    const welcomeImg = document.getElementById('welcome-img');
    const welcomeGlow = document.getElementById('welcome-glow');
    const welcomeBadge = document.getElementById('welcome-badge');
    const welcomeEyebrow = document.getElementById('welcome-eyebrow');
    const welcomeTitle = document.getElementById('welcome-title');
    const welcomeSubtitle = document.getElementById('welcome-subtitle');
    const welcomeCta = document.getElementById('welcome-cta');
    const welcomeDivider = document.getElementById('welcome-divider');
    const welcomeCorner = document.getElementById('welcome-corner');
    let welcomeActive = true;

    function revealWelcome() {
        welcomeGlow.classList.add('visible');
        welcomeBadge.classList.add('visible');
        welcomeEyebrow.classList.add('visible');
        welcomeTitle.classList.add('visible');
        welcomeSubtitle.classList.add('visible');
        welcomeCta.classList.add('visible');
        welcomeDivider.classList.add('visible');
        welcomeCorner.classList.add('visible');
    }

    if (welcomeImg.complete) {
        welcomeImg.classList.add('loaded');
        revealWelcome();
    } else {
        welcomeImg.addEventListener('load', () => {
            welcomeImg.classList.add('loaded');
            revealWelcome();
        });
        welcomeImg.addEventListener('error', () => {
            welcomeImg.style.opacity = '0';
            revealWelcome();
        });
    }

    welcomeOverlay.addEventListener('click', () => {
        if (!welcomeActive) return;
        welcomeActive = false;
        welcomeOverlay.classList.add('exiting');
        setTimeout(() => {
            welcomeOverlay.classList.add('hidden');
        }, 900);
    });

    // Prevent body clicks from firing while welcome is active
    document.body.addEventListener('click', (e) => {
        if (welcomeActive && welcomeOverlay.contains(e.target)) return;
        if (welcomeActive) e.stopImmediatePropagation();
    }, true);

    audio_wave.init();

    // Pomodoro Timer
    const pomodoro = {
        duration: 25 * 60, // 25 minutes in seconds
        remaining: 25 * 60,
        interval: null,
        isRunning: false,

        init() {
            this.display = document.getElementById('timer-display');
            this.controls = document.getElementById('timer-controls');
            this.container = document.getElementById('timer-container');

            document.getElementById('timer-start').onclick = () => this.start();
            document.getElementById('timer-pause').onclick = () => this.pause();
            document.getElementById('timer-reset').onclick = () => this.reset();

            this.updateDisplay();
        },

        start() {
            if (this.isRunning) return;
            this.isRunning = true;
            this.controls.classList.add('visible');

            this.interval = setInterval(() => {
                this.remaining--;
                this.updateDisplay();

                if (this.remaining <= 0) {
                    this.complete();
                }
            }, 1000);
        },

        pause() {
            this.isRunning = false;
            clearInterval(this.interval);
        },

        reset() {
            this.pause();
            this.remaining = this.duration;
            this.updateDisplay();
        },

        complete() {
            this.pause();
            // Flash effect
            this.display.style.color = '#8b4513';
            setTimeout(() => {
                this.display.style.color = '#3a3028';
            }, 2000);
        },

        updateDisplay() {
            const minutes = Math.floor(this.remaining / 60);
            const seconds = this.remaining % 60;
            this.display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    };

    pomodoro.init();
</script>

</html>
